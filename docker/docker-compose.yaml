services:
  gwd:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
      args:
        GWD_VERSION: latest
    container_name: gwd-sandbox
    ports:
      - "3000:3000"
    volumes:
      - ../:/workspace
      - gwd-state:/home/gwd/.gwd
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  gwd-state:
    driver: local
